<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Your Trip — Voyager Elite Travel Agency</title>
  <meta name="description" content="Share your travel plans and we'll craft a personalised itinerary.">
  <meta property="og:title" content="Plan Your Trip — Voyager Elite Travel Agency">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="section"><div class="container"><h2>Plan Your Trip</h2>
      <div id="travel-plan-content">
        <form id="travel-plan-form" class="space-y-4">
          <div class="form-row">
            <div class="form-group"><label>Full Name *</label><input name="name" required placeholder="Your name"></div>
            <div class="form-group"><label>Phone</label><input name="phone" type="tel" placeholder="Your phone"></div>
          </div>

          <div class="form-group"><label>Email *</label><input name="email" type="email" required placeholder="your@email.com"></div>

          <div id="segments-container">
            <!-- Trip segments will be added here by JS -->
          </div>

          <div style="display:flex;gap:0.5rem;align-items:center">
            <button type="button" id="add-segment" class="btn btn-outline">Add Trip Segment</button>
          </div>

          <div class="form-row">
            <div class="form-group"><label>Total Travelers</label><input name="num_travelers" type="number" min="1" placeholder="Number"></div>
            <div class="form-group"><label>Budget per person</label><input name="budget" type="text" placeholder="e.g. 20000"></div>
          </div>

          <div class="form-group"><label>Notes</label><textarea name="notes" rows="4" placeholder="Any overall requirements..."></textarea></div>

          <div style="display:flex;gap:0.5rem"><button type="submit" class="btn btn-primary">Submit Request</button></div>
        </form>
      </div>

      <div id="travel-plan-success" class="hidden">
        <div class="card"><div class="card-body text-center"><h3>Thanks — we'll be in touch</h3><p class="text-sm text-muted">Your custom trip request has been received.</p></div></div>
      </div>

    </div></section>
  </main>
  <div id="site-footer"></div>
  <script src="../js/config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/forms.js"></script>
  <script src="../js/app.js"></script>
  <script>
    VE.initLayout("travel-plan");
    try{ VE_APP.initTravelPlan(); }catch(e){console.error(e);}  
  </script>

  <div id="toast"></div>
</body>
</html>
